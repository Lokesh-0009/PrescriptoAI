<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &ndash; PrescriptoAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(145deg, #F0F9F4 0%, #EAF4FB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .auth-card {
            background: var(--bg-surface);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        
        .auth-brand i {    
            color: var(--primary);
            font-size: 24px;
        }

        .auth-brand span {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            color: var(--primary);
            font-size: 1.4rem;
        }

        .auth-tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .auth-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .auth-link-text {
            font-size: 0.83rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-fast);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .auth-link-text:hover {
            color: var(--primary);
        }

        .auth-link-text.bold-green {
            font-weight: 700;
            color: var(--primary);
        }

        /* Error Toast */
        .auth-error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            background-color: var(--danger, #DC2626);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-md, 0 4px 12px rgba(220, 38, 38, 0.2));
            z-index: 1000;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDownFadeOut 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDownFadeOut {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            10%, 80% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
        }

    </style>
</head>
<body>

<div class="auth-card">
    
    <div class="auth-brand">
        <i class="fas fa-heartbeat"></i>
        <span>PrescriptoAI</span>
    </div>
    <div class="auth-tagline">Sign in to your account</div>

    <form method="POST">
        <div class="mb-3">
            <label class="label-text">USERNAME OR EMAIL</label>
            <div class="input-icon-wrapper">
                <input type="text" class="form-control-custom" name="username" id="username" placeholder="Enter your username or email" required autofocus>
                <i class="fas fa-user"></i>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="label-text">PASSWORD</label>
            <div class="input-icon-wrapper position-relative">
                <input type="password" class="form-control-custom" name="password" id="password" placeholder="Enter your password" required>
                <i class="fas fa-lock"></i>
                <i class="fas fa-eye position-absolute" id="togglePassword" style="right: 12px; left: auto; cursor: pointer; color: var(--text-muted);"></i>
            </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100" style="margin-top: 1.25rem;">
            Sign In
        </button>

        <div class="auth-links">
            <a href="/forgot-password" class="auth-link-text">Forgot Password?</a>
            <div>
                <span class="auth-link-text" style="cursor: default;">Don't have an account?</span>
                <a href="/register" class="auth-link-text bold-green">Sign Up</a>
            </div>
        </div>
    </form>

</div>

<script>
    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

{% if error %}
<div class="auth-error-toast" id="errorToast">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ error }}</span>
</div>
<script>
    setTimeout(() => {
        const toast = document.getElementById('errorToast');
        if (toast) toast.remove();
    }, 4500);
</script>
{% endif %}

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="auth-flash-toast" id="flashToast" style="
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    background-color: {% if category == 'success' %}#0F6B50{% else %}#DC2626{% endif %};
    color: white;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: 0 8px 24px {% if category == 'success' %}rgba(15, 107, 80, 0.3){% else %}rgba(220, 38, 38, 0.3){% endif %};
    z-index: 1000;
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 420px;
    animation: slideDownFadeOut 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
">
    <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-times-circle{% endif %}" style="font-size: 1.1rem;"></i>
    <span>{{ message }}</span>
</div>
{% endfor %}
<script>
    setTimeout(() => {
        const toast = document.getElementById('flashToast');
        if (toast) toast.remove();
    }, 5500);
</script>
{% endif %}
{% endwith %}

</body>
</html>
