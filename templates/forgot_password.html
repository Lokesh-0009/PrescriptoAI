<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password &ndash; PrescriptoAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(145deg, #F0F9F4 0%, #EAF4FB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .auth-card {
            background: var(--bg-surface);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        
        .auth-brand i {    
            color: var(--primary);
            font-size: 24px;
        }

        .auth-brand span {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            color: var(--primary);
            font-size: 1.4rem;
        }

        .auth-tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.5;
        }

        .auth-link-text {
            font-size: 0.83rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-fast);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: inline-block;
            margin-top: 1.5rem;
        }

        .auth-link-text:hover {
            color: var(--primary);
        }

    </style>
</head>
<body>

<div class="auth-card">
    
    <div class="auth-brand">
        <i class="fas fa-heartbeat"></i>
        <span>PrescriptoAI</span>
    </div>
    
    <div class="auth-tagline">
        Enter your admin email address to set a new password.
    </div>

    <form method="POST">
        <div class="mb-3">
            <label class="label-text">ADMIN EMAIL ADDRESS</label>
            <div class="input-icon-wrapper">
                <input type="email" class="form-control-custom" name="email" placeholder="Enter your email" required>
                <i class="fas fa-envelope"></i>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="label-text">NEW PASSWORD</label>
            <div class="input-icon-wrapper">
                <input type="password" class="form-control-custom" name="new_password" placeholder="Enter new password" required>
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100" style="margin-top: 1rem;">
            Send Reset Link
        </button>

        <div class="text-center">
            <a href="/login" class="auth-link-text"><i class="fas fa-arrow-left me-1"></i> Return to Login</a>
        </div>
    </form>
</div>

{% if message %}
<script>
    alert("{{ message }}");
</script>
{% endif %}

</body>
</html>
