<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password &ndash; PrescriptoAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #F0FBF6, #EAF4FB);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(16,120,90,0.12);
            border: 1px solid #E8F5EF;
            padding: 2.5rem 2rem;
        }
        .auth-brand {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 42px;
            cursor: pointer;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="auth-card" data-aos="fade-up">
    
    <div class="auth-brand">
        <i class="fas fa-heartbeat"></i> PrescriptoAI
    </div>

    <form method="POST">
        <div class="mb-4 position-relative">
            <label class="label-text mb-2 d-block">New Password</label>
            <input type="password" id="new_pw" class="form-control-custom" name="password" placeholder="Create a new password" required>
            <i class="fas fa-eye password-toggle" onclick="togglePw('new_pw')"></i>
        </div>

        <div class="mb-4 position-relative">
            <label class="label-text mb-2 d-block">Confirm Password</label>
            <input type="password" id="confirm_pw" class="form-control-custom" name="confirm_password" placeholder="Confirm new password" required>
            <i class="fas fa-eye password-toggle" onclick="togglePw('confirm_pw')"></i>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3" style="font-size: 1rem;">
            Reset Password
        </button>
    </form>

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 600, once: true });

    function togglePw(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
</body>
</html>
